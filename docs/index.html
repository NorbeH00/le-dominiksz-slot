<!doctype html>
<html lang="hu">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Slot Visual Override</title>
  <style>
    body {
      margin: 0;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(180deg, #120922 0%, #26104e 100%);
      color: #fff;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }
    .card {
      width: min(760px, 100%);
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 24px;
      padding: 32px;
      box-shadow: 0 24px 60px rgba(0,0,0,0.28);
      backdrop-filter: blur(8px);
    }
    h1 {
      margin: 0 0 10px;
      font-size: clamp(30px, 5vw, 54px);
      color: #ffd05a;
    }
    p {
      color: #eadfff;
      line-height: 1.6;
      max-width: 62ch;
    }
    a {
      display: inline-block;
      margin-top: 12px;
      padding: 12px 18px;
      border-radius: 12px;
      background: #ffd05a;
      color: #2c1849;
      text-decoration: none;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <section class="card">
    <h1>Le Dominiksz Slot</h1>
    <p>
      Ez a repository a bővítményhez kapcsolódó nyilvános oldalak tárolására szolgál.
      Az adatvédelmi tájékoztató az alábbi linken érhető el.
    </p>
    <a href="./privacy.html">Adatvédelmi tájékoztató megnyitása</a>
  </section>
</body>
</html>
